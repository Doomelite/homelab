services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /media/domel/Gry-i-Programy/Nextcloud/data/Doomel/files:/media
    ports:
      - 8096:8096/tcp
    restart: unless-stopped
    networks:
      - homelab

volumes:
  jellyfin_config:
  jellyfin_cache:

networks:
   homelab:
    external: true
