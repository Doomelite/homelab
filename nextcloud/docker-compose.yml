services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped

    ports:
      - "8082:80"

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - /media/domel/Gry-i-Programy/Nextcloud/html:/var/www/html
      - /media/domel/Gry-i-Programy/Nextcloud/data:/var/www/html/data
      - /media/domel/Gry-i-Programy/Audiobooki:/externals/audiobooks

    networks:
      - homelab

networks:
  homelab:
    external: true
